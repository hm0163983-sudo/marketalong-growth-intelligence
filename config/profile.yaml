# Your capability profile. The daily brief reads this to tailor language + flag
# news that touches tools you already have. Edit freely as your setup changes.
profile:
  skill_level: non_technical_business_owner
  summary: >
    Runs MarketAlong, a digital-marketing agency. Strong on marketing, ads,
    content, and business decisions. Uses AI chat tools comfortably. Does NOT
    read code or use the command line. Wants plain-English, decision-ready info
    with no jargon and no need to click external links.

  # Tools/platforms you already use or have connected. If a news item mentions one,
  # the brief says "✅ you already use this" so you know it's directly relevant.
  # key = word to look for (lowercase) · value = how the brief refers to it.
  tools_you_have:
    hubspot: "your HubSpot CRM"
    canva: "your Canva design tool"
    linkedin: "your LinkedIn"
    notion: "your Notion workspace"
    whatsapp: "your WhatsApp"
    youtube: "your YouTube"
    google ads: "your Google Ads"
    google analytics: "your Google Analytics"
    meta: "your Facebook/Instagram ads"
    facebook: "your Facebook"
    instagram: "your Instagram"
    seo: "your SEO work"
    shopify: "online stores (your Shop vertical)"
    wordpress: "websites you build"
    n8n: "your n8n automation"
    zapier: "automation tools"
    lemlist: "your Lemlist cold-email"
    stripe: "your Stripe payments"
    slack: "your Slack"
    perplexity: "your Perplexity AI"
    peopledatalabs: "your PeopleDataLabs lead enrichment"
    firecrawl: "your Firecrawl web research"

  # The 5 gaps that decide whether MarketAlong stays ahead. If a news item helps
  # close one, the brief flags "🎯 this closes a gap" AND ranks it higher.
  # id · label (plain) · keywords to match (lowercase).
  gaps:
    - id: ai_search_visibility
      label: "Getting found INSIDE AI answers (ChatGPT, Perplexity, Google AI) — not just Google search"
      keywords: ["generative", "ai overview", "ai search", "perplexity", "answer engine", "aeo", "llm", "chatgpt", "gemini", "ai mode"]
    - id: attribution
      label: "Proving which marketing actually drives sales (tracking & attribution)"
      keywords: ["attribution", "server-side", "consent", "privacy", "cookie", "measurement", "conversion tracking", "ga4", "first-party"]
    - id: productized_automation
      label: "Turning your automation stack (n8n, HubSpot, Lemlist) into repeatable services you can sell"
      keywords: ["ai agent", "agent", "automation", "workflow", "n8n", "no-code", "rag", "mcp"]
    - id: short_form_video
      label: "Short-form video content that grows reach"
      keywords: ["short-form", "reels", "shorts", "tiktok", "video", "creator"]
    - id: lead_quality
      label: "Higher-quality leads using enrichment & intent data"
      keywords: ["lead", "enrichment", "intent data", "outbound", "icp", "prospect"]

  # How the brief should phrase the 'get expert advice' helper, for a beginner.
  ai_helpers_note: >
    You can get free expert business advice: open Claude, type /billion-dollar-team,
    and paste the grey box. Eight famous business experts will tell you what to do.
